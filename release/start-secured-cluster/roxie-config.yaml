securedCluster:
  namespace: stackrox
  spec:
    # Match legacy roxctl sensor-generate defaults for the real-load cluster.
    # Note: the fake-load cluster's sensor gets patch-sensor.json overrides
    # via the start-acs config; this cluster uses the unpatched defaults.
    sensor:
      resources:
        requests:
          memory: "500Mi"
          cpu: "500m"
        limits:
          memory: "8Gi"
          cpu: "4"
    # Match legacy roxctl-generate default (vs operator default 1Gi).
    admissionControl:
      resources:
        limits:
          memory: "500Mi"
    scanner:
      scannerComponent: AutoSense
      # Match legacy HPA: min=2/max=5.
      analyzer:
        scaling:
          autoScaling: Enabled
          minReplicas: 2
          maxReplicas: 5
          replicas: 2
    scannerV4:
      # Match legacy HPA: min=2/max=5.
      indexer:
        scaling:
          autoScaling: Enabled
          minReplicas: 2
          maxReplicas: 5
          replicas: 2
    processBaselines:
      autoLock: Enabled
    perNode:
      fileActivityMonitoring:
        mode: Enabled
    customize:
      envVars:
        - name: ROX_NETFLOW_BATCHING
          value: "true"
        - name: ROX_NETFLOW_CACHE_LIMITING
          value: "true"
    overlays:
      - apiVersion: apps/v1
        kind: DaemonSet
        name: collector
        patches:
          - path: spec.template.spec.containers[name:fact].env[-1]
            value: |
              name: FACT_PATHS
              value: "/tmp/data/**/*"
          - path: spec.template.spec.containers[name:fact].env[-1]
            value: |
              name: FACT_LOGLEVEL
              value: "info"
