securedCluster:
  namespace: stackrox
  spec:
    # Match patch-sensor.json from the legacy deploy flow.
    sensor:
      resources:
        requests:
          memory: "3Gi"
          cpu: "2"
        limits:
          memory: "12Gi"
          cpu: "4"
    scanner:
      scannerComponent: AutoSense
      # Legacy roxctl-generate flow produces HPA min=1/max=5 for scanner
      # (vs Helm chart default min=2/max=5).
      analyzer:
        scaling:
          autoScaling: Enabled
          minReplicas: 1
          maxReplicas: 5
          replicas: 1
    scannerV4:
      # Legacy roxctl-generate flow produces HPA min=1/max=1 for scanner-v4
      # (vs Helm chart default min=2/max=5). Effectively no autoscaling.
      indexer:
        scaling:
          autoScaling: Disabled
          replicas: 1
    processBaselines:
      autoLock: Enabled
    perNode:
      fileActivityMonitoring:
        mode: Enabled
    customize:
      envVars:
        - name: ROX_NETFLOW_BATCHING
          value: "true"
        - name: ROX_NETFLOW_CACHE_LIMITING
          value: "true"
    overlays:
      - apiVersion: apps/v1
        kind: DaemonSet
        name: collector
        patches:
          - path: spec.template.spec.containers[name:fact].env[-1]
            value: |
              name: FACT_PATHS
              value: "/tmp/data/**/*"
          - path: spec.template.spec.containers[name:fact].env[-1]
            value: |
              name: FACT_LOGLEVEL
              value: "info"
