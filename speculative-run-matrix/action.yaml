name: Speculative Run Matrix
description: >
  Speculative execution for matrix jobs. Add 'speedracer: [a, b]' (or
  more letters) as the LAST matrix dimension and call this as the first
  step — nothing else needed.

  Each copy looks up its CPU type in rankings/{job-name} (falling back
  to prefix matches, then rankings/_default). Line number = rank;
  higher line = faster. Copies post an in_progress check-run with
  rank embedded, then poll siblings. Higher-ranked siblings win;
  same-rank ties break by letter (higher letter wins).

  Unknown CPUs (not in any ranking file) get rank 0 — defer to everyone.

  The post-step resolves the check-run:
    job success → PATCH to completed/success
    job failure → PATCH to completed/failure
    cancelled   → no action (composite step produced 'cancelled')

inputs:
  check-name:
    description: >
      Override the auto-derived required check name. Auto-derived as:
        github.job + " (" + matrix-values-excluding-speedracer + ")"
      Only set this if the auto-derived name does not match branch protection.
    required: false
    default: ''
  enabled:
    description: 'Set to false to disable speedracer — all copies run normally'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Speedracer
      id: speedracer
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        SR_COPY: ${{ matrix.speedracer }}
        SR_RUN_ID: ${{ github.run_id }}
        SR_REPO: ${{ github.repository }}
        SR_SHA: ${{ github.sha }}
        SR_JOB: ${{ github.job }}
        SR_ENABLED: ${{ inputs.enabled }}
        SR_CHECK_NAME: ${{ inputs.check-name }}
        MATRIX_JSON: ${{ toJSON(matrix) }}
      run: |
        set -euo pipefail

        if [[ "$SR_ENABLED" != 'true' ]]; then
          echo "Speedracer disabled — this copy always runs."
          exit 0
        fi

        state_prefix="/tmp/speedracer-${SR_RUN_ID}-${SR_JOB}"

        if [[ ! "$SR_COPY" =~ ^[a-z]$ ]]; then
          echo "::error::Invalid speedracer value '${SR_COPY}'. Use single lowercase letters: a, b, c, ..."
          exit 1
        fi

        check_name="$SR_CHECK_NAME"
        if [[ -z "$check_name" ]]; then
          other_vals=$(echo "$MATRIX_JSON" | \
            jq -r 'del(.speedracer) | to_entries | map(.value | tostring) | join(", ")' 2>/dev/null) || true
          if [[ -n "$other_vals" ]]; then
            check_name="${SR_JOB} ($other_vals)"
          else
            check_name="$SR_JOB"
          fi
          echo "Auto-derived check-name: $check_name"
        fi

        # ── 1. Rank lookup ──────────────────────────────────────────────────
        cpu=$(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs || true)
        [[ -z "$cpu" ]] && cpu=$(lscpu | awk -F: '/Model name/{gsub(/^ +/,"",$2); print $2}' || true)

        # Extract CPU ID with vendor prefix (e.g., "AMD EPYC 7763 64-Core Processor" → "EPYC-7763")
        cpu_id=$(echo "$cpu" | sed 's/AMD //; s/Intel(R) Xeon(R) Platinum /Xeon-/; s/INTEL(R) XEON(R) PLATINUM /Xeon-/; s/ [0-9]*-Core Processor//; s/ CPU @ .*//; s/ /-/')

        # Find ranking file: exact job name → prefix match → _default
        ranking_dir="${GITHUB_ACTION_PATH}/rankings"
        ranking_file=""
        name="$SR_JOB"
        while [[ -n "$name" ]]; do
          if [[ -f "$ranking_dir/$name" ]]; then
            ranking_file="$ranking_dir/$name"
            break
          fi
          next="${name%-*}"
          [[ "$next" == "$name" ]] && break
          name="$next"
        done
        [[ -z "$ranking_file" && -f "$ranking_dir/_default" ]] && ranking_file="$ranking_dir/_default"

        my_rank=0
        if [[ -n "$ranking_file" ]]; then
          my_rank=$(grep -nxF "$cpu_id" "$ranking_file" | cut -d: -f1 || true)
          [[ -z "$my_rank" || ! "$my_rank" =~ ^[0-9]+$ ]] && my_rank=0
          echo "cpu_id=${cpu_id} rank=${my_rank} file=${ranking_file#"$ranking_dir/"}"
        else
          echo "cpu_id=${cpu_id} rank=0 file=(none)"
        fi
        echo "cpu=${cpu:-unknown} copy=${SR_COPY} rank=${my_rank}"

        ext_id=$(printf 'spec-r%03d-%s-%s-%s' "$my_rank" "$SR_COPY" "$SR_RUN_ID" "$check_name")

        # ── 2. Post in_progress check-run ───────────────────────────────────
        check_id=$(gh api "repos/${SR_REPO}/check-runs" \
          -f name="${check_name}" \
          -f head_sha="${SR_SHA}" \
          -f status=in_progress \
          -f external_id="${ext_id}" \
          --jq '.id') || {
          echo "::warning::Failed to post check-run — proceeding without speedracer"
          exit 0
        }
        printf '%s\n' "${check_id:-}" > "${state_prefix}-check-id"
        echo "Posted in_progress check-run ${check_id} (${ext_id})"

        printf '%s\n' "${check_name}" > "${state_prefix}-check-name"
        printf '%s\n' "${SR_COPY}" > "${state_prefix}-copy"
        printf '%s\n' "${my_rank}" > "${state_prefix}-rank"

        # ── 3. Poll for higher-ranked siblings ──────────────────────────────
        # Higher rank wins. Same rank → higher letter wins.
        # external_id format (spec-r{rank:03d}-{letter}-...) sorts correctly.
        echo "Polling for higher-ranked siblings..."
        sleep $(( RANDOM % 3 + 5 ))

        deadline=$(( $(date +%s) + 15 ))
        while [[ $(date +%s) -lt $deadline ]]; do
          response=$(gh api \
            "repos/${SR_REPO}/commits/${SR_SHA}/check-runs?per_page=100&filter=all") || {
            echo "::warning::Failed to poll check-runs"
            break
          }

          siblings=$(echo "$response" | jq -r \
            --arg run "$SR_RUN_ID" --arg name "$check_name" \
            '[.check_runs[]
              | select(.external_id | startswith("spec-"))
              | select(.external_id | endswith("-" + $run + "-" + $name))
              | select(.status == "in_progress" or .conclusion == "success")
              | .external_id
            ] | .[]')

          for sid in $siblings; do
            [[ "$sid" == "$ext_id" ]] && continue

            sib_rank=$(echo "$sid" | cut -d- -f2 | tr -d 'r')
            sib_letter=$(echo "$sid" | cut -d- -f3)

            [[ "$sib_rank" =~ ^[0-9]+$ ]] || continue

            if [[ "$sib_rank" -gt "$my_rank" ]] || \
               [[ "$sib_rank" -eq "$my_rank" && "$sib_letter" > "$SR_COPY" ]]; then
              echo "Higher-priority sibling ${sid} (rank=${sib_rank}, letter=${sib_letter}) — cancelling."
              kill -TERM "$PPID"
              # SIGTERM kills the composite step's parent; sleep prevents this script from continuing if it doesn't
              sleep 600
            fi
          done

          sleep 3
        done
        echo "No higher-priority siblings found — proceeding."

        echo "Speedracer ready — proceeding to work."

    # ${{ job.status }} is evaluated at post-step execution time by GHA.
    - name: Register post-hook
      uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.0
      if: inputs.enabled == 'true'
      with:
        shell: bash
        run: 'true'
        post: |
          set -euo pipefail
          export GH_TOKEN=${{ github.token }}
          state_prefix="/tmp/speedracer-${{ github.run_id }}-${{ github.job }}"
          if [[ ! -f "${state_prefix}-check-id" ]]; then
            echo "No speedracer state — skipping post-step"
            exit 0
          fi
          check_name=$(head -1 < "${state_prefix}-check-name" | tr -d '\n' || true)
          my_copy=$(head -1 < "${state_prefix}-copy" | tr -d '\n' || true)
          check_id=$(head -1 < "${state_prefix}-check-id" | tr -d '[:space:]' || true)
          echo "Speedracer post: job.status=${{ job.status }} copy=${my_copy} check_id=${check_id}"

          [[ "$check_id" =~ ^[0-9]+$ ]] || { echo "no valid check-id, skipping"; exit 0; }

          if [[ "${{ job.status }}" == "success" ]]; then
            gh api "repos/${{ github.repository }}/check-runs/${check_id}" -X PATCH \
              -f status=completed \
              -f conclusion=success \
              -f "output[title]=Speedracer complete" \
              -f "output[summary]=Copy ${my_copy} won." \
              && echo "check-run → success" \
              || echo "::warning::PATCH success failed"
          elif [[ "${{ job.status }}" == "failure" ]]; then
            gh api "repos/${{ github.repository }}/check-runs/${check_id}" -X PATCH \
              -f status=completed \
              -f conclusion=failure \
              -f 'output[title]=Speedracer cleanup' \
              -f 'output[summary]=Job failed; check-run resolved.' \
              && echo "check-run → failure" \
              || echo "::warning::PATCH failure failed"
          else
            echo "job.status=${{ job.status }} — no action taken (cancelled or other)"
          fi
