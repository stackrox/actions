name: Run a script
description: Run a shell script with a given name with provided arguments
inputs:
  script:
    description: Script name
    required: false
    default: test/test.sh
  params:
    description: JSON array with script arguments
    required: true
runs:
  using: composite
  steps:
    - run: |
        eval "${GITHUB_ACTION_PATH}/../common/common.sh" \
          "${GITHUB_ACTION_PATH}/../${{ inputs.script }}" \
          $(echo '${{ inputs.params }}' | jq -r @sh)
      shell: bash
